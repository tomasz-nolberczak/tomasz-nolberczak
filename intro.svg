<svg fill="none" viewBox="0 0 800 420" width="800" height="420" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>

				html, body, div, h1, p, a, ul, li {
					margin: 0;
					padding: 0;
					border: 0;
					font-size: 100%;
					font: inherit;
					vertical-align: baseline;
					box-sizing: border-box;
				}

				@keyframes FadeIn {
					0% { opacity: 0; }
					100% { opacity: 1; }
				}

				@keyframes WaveAnimation {
					0% { transform: rotate( 0.0deg) }
					10% { transform: rotate(14.0deg) }
					20% { transform: rotate(-8.0deg) }
					30% { transform: rotate(14.0deg) }
					40% { transform: rotate(-4.0deg) }
					50% { transform: rotate(10.0deg) }
					60% { transform: rotate( 0.0deg) }
					100% { transform: rotate( 0.0deg) }
				}

				@-webkit-keyframes Gradient {
					0%{background-position:0% 50%}
					50%{background-position:100% 50%}
					100%{background-position:0% 50%}
				}
				@-moz-keyframes Gradient {
					0%{background-position:0% 50%}
					50%{background-position:100% 50%}
					100%{background-position:0% 50%}
				}
				@keyframes Gradient {
					0%{background-position:0% 50%}
					50%{background-position:100% 50%}
					100%{background-position:0% 50%}
				}

				@keyframes textShine {
					0% { background-position: 0% 50%; }
					100% { background-position: 100% 50%; }
				}

				:root {
					--color-text-light: #24292f;
					--color-accent-light: rgba(0, 0, 0, 0.07);
					--color-text-dark: #c9d1d9;
					--color-accent-dark: rgba(255, 255, 255, 0.1);
				}

				#container {
					font-family:
						system-ui,
						-apple-system,
						BlinkMacSystemFont,
						'Segoe UI',
						Roboto,
						Helvetica,
						Arial,
						sans-serif,
						'Apple Color Emoji',
						'Segoe UI Emoji';
					display: flex;
					flex-direction: column;
					margin: 0;
					width: 100%;
					height: 420px;
					background: transparent;
					padding: 48px 24px;
					text-align: left;
					font-weight: 100;
					color: var(--color-text-light);
				}

				.shine {
					background: linear-gradient(
						to right,
						#7953cd 20%,
						#00affa 30%,
						#0190cd 70%,
						#764ada 80%
					);
					background-size: 500% auto;
					animation: textShine 5s ease-in-out infinite alternate;
				}

				.text-shine {
					-webkit-background-clip: text;
					background-clip: text;
					-webkit-text-fill-color: transparent;
					text-fill-color: transparent;
				}

				.frame {
					opacity: 0;
					animation: FadeIn 2s ease;
					-webkit-animation-fill-mode: forwards;
					animation-fill-mode: forwards;
				}

				.frame-1 { /* no delay */ }
				.frame-2 { animation-delay: 0.5s; }
				.frame-3 { animation-delay: 1s; }
				.frame-4 { animation-delay: 1.5s; }

				h1, p, a {
					-webkit-font-smoothing: antialiased;
					-moz-osx-font-smoothing: grayscale;
				}

				h1 {
					font-size: 24px;
					margin-bottom: 32px;
					font-weight: 700;
				}

				p {
					font-size: 16px;
					line-height: 1.5;
					color: var(--color-text-light);
					margin-bottom: 24px;
				}

				.sm * {
					font-size: 14px;
				}

				p strong {
					font-weight: 400;
				}

				ul {
					display: flex;
					flex-wrap: wrap;
					list-style: none;
					margin-top: 12px;
				}

				ul li {
					opacity: 0;
					padding: 4px 8px;
					margin-right: 8px;
					margin-bottom: 8px;
					border-radius: 4px;
					background: var(--color-accent-light);
					color: var(--color-text-light);
					position: relative;
					transition: background 0.2s ease;
				}

				ul li.typescript { animation-delay: 2s; }
				ul li.react      { animation-delay: 2.5s; }
				ul li.next       { animation-delay: 3s; }
				ul li.remix      { animation-delay: 3.5s; }
				ul li.node       { animation-delay: 4s; }
				ul li.tailwind   { animation-delay: 4.5s; }
				ul li.postgres   { animation-delay: 5s; }
				ul li.docker     { animation-delay: 5.5s; }

				@media (prefers-color-scheme: dark) {
					#container { color: var(--color-text-dark); }
					p { color: var(--color-text-dark); }
					ul li {
						background: var(--color-accent-dark);
						color: var(--color-text-dark);
					}
				}

				.wave {
					animation-name: WaveAnimation;
					animation-duration: 2.5s;
					animation-iteration-count: infinite;
					transform-origin: 70% 70%;
					display: inline-block;
				}

				.just-a-bar {
					width: 160px;
					height: 3px;
					margin-bottom: 24px;
				}
			</style>
			<div id="container">
				<div class="frame frame-1">
					<h1><span class="shine text-shine">Hi, I'm Tomasz</span> <div class="wave">👋</div></h1>
				</div>
				<div class="frame frame-2">
					<p>Full-stack developer and team lead with <strong>12+ years</strong> of experience. I build end-to-end — React and Remix frontends, Node.js backends. Based in Łódź, Poland.</p>
				</div>
				<div class="frame frame-3">
					<p>Shipped production products for real audiences — Norwegian media platforms, Polish e-commerce, health tech. The kind of work you can actually find across the web.</p>
				</div>
				<div class="frame frame-4">
					<div class="sm">
						<div class="just-a-bar shine"></div>
						<p>Technologies I work with daily:</p>
						<ul>
							<li class="frame typescript">TypeScript</li>
							<li class="frame react">React</li>
							<li class="frame next">Next.js</li>
							<li class="frame remix">Remix</li>
							<li class="frame node">Node.js</li>
							<li class="frame tailwind">Tailwind</li>
							<li class="frame postgres">PostgreSQL</li>
							<li class="frame docker">Docker</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>
